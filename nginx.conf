events {
    worker_connections 1024;
}

http {
   client_max_body_size 7M;

    server {
        listen 80;
        # 1. Jalur khusus untuk mengambil gambar dari MinIO
        # GANTI "nama-bucket-kamu" sesuai nama bucket kamu!
        location /image-inventory/ {
            proxy_pass http://minio:9000/image-inventory/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Jalur untuk aplikasi Web (Express.js)
        location / {
            proxy_pass http://web_app:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}